	<body>

			  <!-- Brand and toggle get grouped for better mobile display -->

			    <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1" aria-expanded="false">

			      <span class="icon-bar"></span>
			      <span class="icon-bar"></span>
			    </button>
			    <a class="navbar-brand" href="#">Jacob</a>
			  </div>
			
			  <!-- Collect the nav links, forms, and other content for toggling -->
			  <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
			    <ul class="nav navbar-nav">
			      <li class="active"><a href="#">Home <span class="sr-only">(current)</span></a></li>
			      <li class="dropdown">
			        <a href="#" class="dropdown-toggle" data-toggle="dropdown" role="button" aria-haspopup="true" aria-expanded="false">Games <span class="caret"></span></a>
			        <ul class="dropdown-menu">

    <section id="home" class="main jumbotron">
      <div class="col-sm-4 col-sm-offset-5">
        <div>
        	<h1><span id="error"></span><br/><span id="pagenotfound"></span></h1>
          <a href="./" style="opacity: 0" id="home-btn">Return to Home</a>
        </div>
      </div>
    </section>
    <!--jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <!-- Include all compiled plugins (below), or include individual files as needed -->
	  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
	  <script src="bower_components/TheaterJS/dist/theater.min.js"></script>
    <script src="https://use.fontawesome.com/6d136cce45.js"></script>
    <script src="main.js"></script>
		<script>
    	/* global theaterJS */
    	var theater = theaterJS()

			theater
        .on('type:start, erase:start', () => {
        // add a class to actor's dom element when he starts typing/erasing
            const actor = theater.getCurrentActor();
            actor.$element.classList.add('typing');
        })
        .on('type:end, erase:end', () => {
        // and then remove it when he's done
            const actor = theater.getCurrentActor();
            actor.$element.classList.remove('typing');
        });
    	
    	$(document).ready(function() {
				theater
				  .addActor('error', { speed: 0.6, accuracy: 0.8 })
				  .addActor('pagenotfound', { speed: 0.6, accuracy: 0.8 })
				  .addScene('error:Error 404')
				  .addScene(function(done) {
				  	setTimeout(function() {
					  	done();
				  	}, 500);
				  })
				  .addScene('pagenotfound:Page Not Found')
				  .addScene(function(done) {
				  	setTimeout(function() {
					  	document.getElementById("home-btn").style.opacity = '1';
				  	}, 300);
				  	
				  	done();
				  })
    	});
		</script>
	</body>
</html>
